font = JetBrainsMono Nerd Font:weight=Medium:size=12
include = ~/.config/foot/dracula.ini

term = xterm-256color
pad = 3x3
workers = 8
selection-target=clipboard

[security]
osc52 = enabled

[scrollback]
lines = 100000

[url]
launch = xdg-open ${url}
label-letters = sadfjklewcmpgh
osc8-underline = url-mode

[cursor]
style = block
blink = yes

[mouse]
hide-when-typing = no

[csd]
preferred=none

[bell]
system=no

[key-bindings]
spawn-terminal=none

[environment]
TMUX = ""

# vim: ft=dosini
